<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGAPAY Admin Login</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* ===== AGAPAY LOGIN STYLE ===== */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Montserrat',sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background: radial-gradient(circle at center, #C50010 0%, #021a32 70%);
}

/* Card */
.login-card{
  width: 420px;   /* ✅ AYOS NA */
  background:white;
  padding:50px;
  border-radius:28px;
  box-shadow:0 40px 90px rgba(0,0,0,0.35);
  text-align:center;
}

.login-card img{
  height: 90px;   /* ✅ AYOS NA */
  margin-bottom:22px;
}

/* FIXED LOGO PATH */
.login-logo{
  width: 300px;
  height: auto;
}

.login-card h2{
  color:#0b2239;
  font-weight:800;
  margin-bottom:8px;
}

.login-card p{
  color:#64748b;
  font-size:14px;
  margin-bottom:30px;
}

/* Inputs */
.input-group{
  margin-bottom:18px;
  text-align:left;
}

.input-group input{
  width:100%;
  height:56px;
  border-radius:14px;
  border:1px solid #dbe3ee;
  padding:16px;
  font-size:15px;
  transition:0.25s ease;
}

/* Options row */
.options{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:14px;
  margin-bottom:24px;
}

/* Button */
.login-btn{
  width:100%;
  height:54px;
  border:none;
  border-radius:14px;
  background:#012F48;
  color:white;
  font-weight:700;
  font-size:15px;
  cursor:pointer;
  transition:0.25s ease;
}
</style>
</head>

<body>

<div class="login-card">
    <img src="/logo.svg" alt="AGAPAY Logo" class="login-logo">

    <h2>Admin Login</h2>
    <p>Please enter your username and password</p>

    <form onsubmit="handleLogin(event)">
        <div class="input-group">
            <input id="username" type="text" placeholder="User name" required>
        </div>

        <div class="input-group">
            <input id="password" type="password" placeholder="Password" required>
        </div>

        <div class="options">
            <label><input type="checkbox"> Keep me signed in</label>
            <a href="#">Forgot password?</a>
        </div>

        <button id="loginBtn" class="login-btn">Login</button>
    </form>
</div>

<script>
function handleLogin(e){
    e.preventDefault();

    const btn = document.getElementById('loginBtn');
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value.trim();

    btn.innerText = "Checking...";
    btn.disabled = true;

    setTimeout(()=>{

        const correctUser = "admin";
        const correctPass = "1234";

        if(user === correctUser && pass === correctPass){
            window.location.href = "/dashboard";
        } else {
            alert("❌ Invalid username or password");
            btn.innerText = "Login";
            btn.disabled = false;
        }

    }, 1200);
}
</script>

</body>
</html>
